<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HighScore – Billboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/billboard.css">
</head>
<body>

<canvas id="bg"></canvas>
<div id="vignette"></div>
<div id="scan"></div>

<div id="header-stripe"></div>
<div id="sport-badge"></div>

<div id="wait-overlay">
  <div class="wt-logo">HIGH<span>SCORE</span></div>
  <div class="wt-msg">WAITING FOR DATA</div>
  <div class="wt-dot"></div>
</div>

<div id="main">
  <!-- LEFT TEAM -->
  <div class="team-block left" id="team-a-block">
    <div class="amb"></div>
    <div class="team-name" id="name-a">TEAM A</div>
    <div class="team-score" id="score-a">0</div>
    <div class="team-sub" id="sub-a"></div>
  </div>

  <!-- CENTER PANEL -->
  <div id="center-panel">
    <div class="cp-brk tl"></div><div class="cp-brk tr"></div>
    <div class="cp-brk bl"></div><div class="cp-brk br"></div>

    <!-- Main timer ring -->
    <div id="timer-wrap">
      <div id="timer-liquid"></div>
      <svg id="timer-svg" viewBox="0 0 100 100">
        <circle id="t-bg" cx="50" cy="50" r="42" fill="none"/>
        <circle id="t-fill" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="0" fill="none"/>
      </svg>
      <div id="timer-text">
        <div id="timer-digits">00:00</div>
        <div id="timer-lbl-inner">TIME</div>
      </div>
    </div>

    <!-- Shotclock (basketball only — 15 s) -->
    <div id="shotclock-wrap">
      <div id="sc-ring">
        <svg viewBox="0 0 100 100">
          <circle id="sc-bg" cx="50" cy="50" r="42" fill="none"/>
          <circle id="sc-fill" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="0" fill="none"/>
        </svg>
      </div>
      <div id="shotclock-label">SHOT</div>
      <div id="shotclock-digits">15</div>
    </div>

    <!-- Quarter / Half number -->
    <div id="round-lbl" style="display:none">QUARTER</div>
    <div id="round-num" style="display:none">1</div>
    <div id="round-of" style="display:none">OF 4</div>

    <!-- Status -->
    <div id="status-pill">WAITING</div>
  </div>

  <!-- RIGHT TEAM -->
  <div class="team-block right" id="team-b-block">
    <div class="amb"></div>
    <div class="team-name" id="name-b">TEAM B</div>
    <div class="team-score" id="score-b">0</div>
    <div class="team-sub" id="sub-b"></div>
  </div>
</div>

<!-- BOTTOM BAR: players -->
<div id="bottom-bar">
  <div class="players-col left-col" id="players-a"></div>
  <div id="bb-spacer"></div>
  <div class="players-col right-col" id="players-b"></div>
</div>

<div id="footer-stripe"></div>

<!-- INTERMISSION -->
<div id="int-overlay">
  <div id="int-label">INTERMISSION</div>
  <div id="int-timer">15:00</div>
  <div id="int-next">NEXT PERIOD STARTING SOON</div>
</div>

<!-- COUNTDOWN -->
<div id="countdown-overlay"><div id="countdown-digit">3</div></div>

<!-- WINNER OVERLAY -->
<div id="winner-overlay"><div id="winner-text">TEAM A WINS</div></div>

<!-- SCORE FLASH -->
<div id="score-flash">
  <div id="flash-text">SCORE!</div>
  <div id="flash-sub">HIGHSCORE</div>
</div>

<div id="footer-logo">HIGH<span>SCORE</span> <span class="ver" id="fl-ver"></span></div>

<!-- UI libraries: Alpine.js (declarative micro-framework) + GSAP (animations) -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<!-- externalized script -->
<script src="../js/billboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HighScore – Billboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;}

body{
  --bg1:#05050f;
  --accent:#f0c040;
  --teamA:#e83050;--teamB:#3090f8;
  --glowA:rgba(232,48,80,0.55);--glowB:rgba(48,144,248,0.55);
  --dimA:rgba(232,48,80,0.10);--dimB:rgba(48,144,248,0.10);
  --center:#0a0a18;--border:#181830;
  --text:#e8e8f8;--dim:#3a3a58;
  --green:#38e888;--orange:#f07030;--red:#e83050;
  background:var(--bg1);
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  display:flex;flex-direction:column;
  position:relative;
}

/* Sport themes */
body.sport-basketball{
  --bg1:#060200;--accent:#ff7700;
  --teamA:#e83050;--teamB:#ff9800;
  --glowA:rgba(232,48,80,0.6);--glowB:rgba(255,152,0,0.6);
  --dimA:rgba(232,48,80,0.11);--dimB:rgba(255,152,0,0.11);
  --center:#0a0300;--border:#1e0e00;
}
body.sport-football{
  --bg1:#010801;--accent:#44e866;
  --teamA:#e83050;--teamB:#30b8f8;
  --glowA:rgba(232,48,80,0.6);--glowB:rgba(48,184,248,0.6);
  --dimA:rgba(232,48,80,0.10);--dimB:rgba(48,184,248,0.10);
  --center:#010d01;--border:#081e08;
}
body.sport-handball{
  --bg1:#030310;--accent:#aa88ff;
  --teamA:#e83050;--teamB:#aa88ff;
  --glowA:rgba(232,48,80,0.6);--glowB:rgba(170,136,255,0.6);
  --dimA:rgba(232,48,80,0.10);--dimB:rgba(170,136,255,0.10);
  --center:#040418;--border:#141430;
}
body.sport-volleyball{
  --bg1:#010510;--accent:#38b8f8;
  --teamA:#e83050;--teamB:#38b8f8;
  --glowA:rgba(232,48,80,0.6);--glowB:rgba(56,184,248,0.6);
  --dimA:rgba(232,48,80,0.10);--dimB:rgba(56,184,248,0.10);
  --center:#010510;--border:#082040;
}

/* ══════════════════════════════════════════════════════
   BG LAYERS
══════════════════════════════════════════════════════ */
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%,transparent 15%,rgba(0,0,0,0.9) 100%);}
#scan{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);}

/* ══════════════════════════════════════════════════════
   HEADER STRIPE + BADGE
══════════════════════════════════════════════════════ */
#header-stripe{
  height:2px;flex-shrink:0;z-index:10;position:relative;
  background:linear-gradient(90deg,var(--teamA),var(--accent) 50%,var(--teamB));
  transition:background 0.6s;
  box-shadow:0 0 24px rgba(240,192,64,0.18);
}
#sport-badge{
  position:fixed;top:8px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:0.68rem;
  letter-spacing:0.5em;color:var(--dim);z-index:10;white-space:nowrap;
}

/* ══════════════════════════════════════════════════════
   WAITING OVERLAY
══════════════════════════════════════════════════════ */
#wait-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;backdrop-filter:blur(10px);
}
#wait-overlay .wt-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,6rem);letter-spacing:0.2em;color:rgba(255,255,255,0.06);}
#wait-overlay .wt-logo span{color:rgba(240,192,64,0.12);}
#wait-overlay .wt-msg{font-size:0.8rem;letter-spacing:0.45em;color:#252535;text-transform:uppercase;}
#wait-overlay .wt-dot{width:6px;height:6px;border-radius:50%;background:#1e1e30;animation:dotPulse 2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:0.3}50%{opacity:1}}

/* ══════════════════════════════════════════════════════
   ROOT LAYOUT
   body → #header-stripe / #main / #bottom-bar / #footer-stripe
   #main → .team-left | #center-panel | .team-right
══════════════════════════════════════════════════════ */
#main{
  flex:1;
  display:flex;
  align-items:stretch;
  overflow:hidden;
  position:relative;z-index:10;
  min-height:0;
}

/* ══════════════════════════════════════════════════════
   TEAM BLOCKS (left / right)
══════════════════════════════════════════════════════ */
.team-block{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:44px 14px 10px;
  position:relative;overflow:hidden;
}
/* ambient glow */
.team-block .amb{
  position:absolute;pointer-events:none;
  animation:ambPulse 6s ease-in-out infinite;
}
.team-block.left  .amb{width:85%;height:80%;top:-20%;left:-10%;background:radial-gradient(ellipse,var(--dimA) 0%,transparent 70%);}
.team-block.right .amb{width:85%;height:80%;top:-20%;right:-10%;background:radial-gradient(ellipse,var(--dimB) 0%,transparent 70%);animation-direction:reverse;}
@keyframes ambPulse{0%,100%{opacity:0.5}50%{opacity:1.3}}
/* side border */
.team-block.left::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--teamA) 50%,transparent);opacity:0.3;}
.team-block.right::after{content:'';position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--teamB) 50%,transparent);opacity:0.3;}

/* ── TEAM NAME ── */
.team-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4rem,6.8vw,7rem);
  letter-spacing:0.06em;line-height:1;text-align:center;
  position:relative;z-index:2;
  margin-bottom:10px;
}
.team-block.left  .team-name{color:var(--teamA);text-shadow:0 0 50px var(--glowA);}
.team-block.right .team-name{color:var(--teamB);text-shadow:0 0 50px var(--glowB);}

/* ── SCORE ── very tall */
.team-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(14rem,34vh,33rem);
  line-height:0.74;
  position:relative;z-index:2;
  flex-shrink:0;
  transform:scaleY(1.22) scaleX(0.88);
  transform-origin:center top;
  margin-top:8px;
  margin-bottom:20px;
}
.team-block.left  .team-score{color:var(--teamA);text-shadow:0 0 60px var(--glowA),0 0 120px var(--glowA),0 0 200px rgba(232,48,80,0.06);}
.team-block.right .team-score{color:var(--teamB);text-shadow:0 0 60px var(--glowB),0 0 120px var(--glowB),0 0 200px rgba(48,144,248,0.06);}
.team-score.bump{animation:scoreBump 0.45s cubic-bezier(0.2,0,0.4,1);}
@keyframes scoreBump{0%{transform:scale(1)}30%{transform:scale(1.18);filter:brightness(2.8)}100%{transform:scale(1);filter:brightness(1)}}

/* ── TEAM SUB (below score) ── */
.team-sub{
  position:relative;z-index:2;
  width:100%;text-align:center;
  margin-top:6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
/* Basketball: team fouls display */
.tf-label{font-size:0.72rem;letter-spacing:0.35em;color:var(--dim);text-transform:uppercase;}
.tf-count{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.4rem;line-height:1;
  color:var(--orange);
}
/* Football: cards */
.cards-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.card-icon{display:inline-block;border-radius:3px;}
.card-icon.red{
  width:22px;height:30px;
  background:var(--red);
  box-shadow:0 0 10px rgba(232,48,80,0.8),0 0 20px rgba(232,48,80,0.4);
}
.card-icon.yellow{
  width:18px;height:24px;
  background:#f0c040;
  box-shadow:0 0 8px rgba(240,192,64,0.8);
}
.no-cards-lbl{font-size:0.68rem;letter-spacing:0.2em;color:var(--dim);}

/* ══════════════════════════════════════════════════════
   CENTER PANEL
══════════════════════════════════════════════════════ */
#center-panel{
  width:280px;
  min-width:230px;
  flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  background:var(--center);
  border-left:2px solid var(--border);
  border-right:2px solid var(--border);
  padding:16px 12px 12px;
  gap:10px;
  position:relative;z-index:5;
  transition:background 0.6s,border-color 0.6s,width 0.3s;
}
#center-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.6;}
#center-panel::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.25;}
.cp-brk{position:absolute;width:10px;height:10px;}
.cp-brk.tl{top:6px;left:6px;border-top:1px solid var(--accent);border-left:1px solid var(--accent);opacity:0.4;}
.cp-brk.tr{top:6px;right:6px;border-top:1px solid var(--accent);border-right:1px solid var(--accent);opacity:0.4;}
.cp-brk.bl{bottom:6px;left:6px;border-bottom:1px solid var(--accent);border-left:1px solid var(--accent);opacity:0.4;}
.cp-brk.br{bottom:6px;right:6px;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent);opacity:0.4;}

/* ── MAIN TIMER RING ── */
#timer-wrap{
  width:190px;height:190px;
  position:relative;flex-shrink:0;
}
body.sport-basketball #timer-wrap{width:92%;height:160px;max-width:250px;}

#timer-svg{
  width:100%;height:100%;
  transform:rotate(-90deg);
  position:absolute;top:0;left:0;
}
/* For basketball wide mode, use an ellipse-friendly viewBox stretch */
body.sport-basketball #timer-svg{preserveAspectRatio:none;}

#t-bg{fill:none;stroke:var(--border);stroke-width:4;}
#t-fill{fill:none;stroke-width:4;stroke-linecap:round;stroke:var(--accent);
  transition:stroke-dashoffset 0.9s linear,stroke 0.5s;
  filter:drop-shadow(0 0 5px var(--accent));}
#timer-text{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#timer-digits{
  font-family:'Bebas Neue',sans-serif;
  font-size:3.1rem;letter-spacing:0.05em;line-height:1;
  color:var(--text);transition:color 0.3s;
}
body.sport-basketball #timer-digits{font-size:3.2rem;}
#timer-lbl-inner{font-size:0.48rem;letter-spacing:0.3em;color:var(--dim);margin-top:2px;}
#timer-liquid{
  position:absolute;bottom:0;left:0;width:100%;
  border-radius:0 0 55px 55px;
  background:rgba(240,192,64,0.06);
  transition:height 1s linear,background 0.5s;
  pointer-events:none;overflow:hidden;
}
#timer-liquid::after{content:'';position:absolute;top:-8px;left:-50%;width:200%;height:14px;
  background:rgba(240,192,64,0.08);border-radius:40%;
  animation:wave 2.4s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:translateX(-10px) scaleY(1)}50%{transform:translateX(10px) scaleY(1.6)}}
#timer-wrap.warning #timer-digits{color:var(--orange);animation:tPulse 0.8s ease-in-out infinite;}
@keyframes tPulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* ── SHOTCLOCK (basketball 15-second timer) ── */
#shotclock-wrap{
  display:none;  /* shown only in basketball */
  align-items:center;justify-content:center;
  gap:6px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:4px;
  padding:4px 12px;
  width:100%;
}
body.sport-basketball #shotclock-wrap{display:flex;}
body.sport-basketball #round-lbl{order:2;}
body.sport-basketball #round-num{order:3;}
body.sport-basketball #round-of{order:4;}
body.sport-basketball #shotclock-wrap{order:5;}
body.sport-basketball #status-pill{order:6;}
#shotclock-label{font-size:0.55rem;letter-spacing:0.35em;color:var(--dim);text-transform:uppercase;}
#shotclock-digits{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;letter-spacing:0.05em;line-height:1;
  color:var(--accent);
  transition:color 0.3s;
}
#shotclock-digits.warn{color:var(--red);animation:tPulse 0.6s ease-in-out infinite;}
#sc-ring{position:relative;width:32px;height:32px;flex-shrink:0;}
#sc-ring svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg);}
#sc-bg{fill:none;stroke:var(--border);stroke-width:5;}
#sc-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke:var(--accent);transition:stroke-dashoffset 0.9s linear,stroke 0.3s;filter:drop-shadow(0 0 3px var(--accent));}

/* ── ROUND / HALF / QUARTER ── */
#round-lbl{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:0.4em;color:var(--dim);}
#round-num{font-family:'Bebas Neue',sans-serif;font-size:4.4rem;color:var(--text);line-height:1;}
#round-of{font-size:0.55rem;letter-spacing:0.25em;color:var(--dim);margin-top:-4px;}

/* ── STATUS PILL ── */
#status-pill{
  background:var(--border);border-radius:3px;
  padding:3px 14px;font-size:0.58rem;letter-spacing:0.32em;
  color:var(--dim);text-transform:uppercase;
  font-family:'Bebas Neue',sans-serif;transition:all 0.3s;
}
#status-pill.live{background:rgba(56,232,136,0.08);color:var(--green);border:1px solid rgba(56,232,136,0.25);animation:liveBlink 2.5s ease-in-out infinite;}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:0.5}}
#status-pill.intermission{background:rgba(240,112,48,0.1);color:var(--orange);border:1px solid rgba(240,112,48,0.28);}
#status-pill.ended{background:rgba(232,48,80,0.1);color:var(--red);border:1px solid rgba(232,48,80,0.28);}

/* ══════════════════════════════════════════════════════
   BOTTOM BAR — players section
   Hidden unless basketball/handball/volleyball
══════════════════════════════════════════════════════ */
#bottom-bar{
  display:none;  /* enabled per-sport via JS */
  flex-shrink:0;
  position:relative;z-index:10;
  border-top:1px solid var(--border);
  max-height:40vh;
  overflow:hidden;
}
#bottom-bar.show{display:flex;}

/* basketball layout: left players | spacer | right players */
#bottom-bar.bball-layout{
  flex-direction:row;
  align-items:flex-start;
}
/* handball/volleyball layout: two columns side by side */
#bottom-bar.free-layout{
  flex-direction:row;
  align-items:flex-start;
}

.players-col{
  flex:1;
  display:flex;flex-wrap:wrap;
  gap:4px;
  padding:8px 10px;
  align-content:flex-start;
  overflow-y:auto;
  max-height:40vh;
}
.players-col.left-col{justify-content:flex-end;}
.players-col.right-col{justify-content:flex-start;}

/* center spacer aligning with center panel */
#bb-spacer{
  width:280px;flex-shrink:0;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  background:var(--center);
}
body.sport-basketball #bb-spacer{width:var(--cp-width,220px);}

/* ── PLAYER CARD (basketball) ── */
.player-card{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(8,8,20,0.88);
  border:1px solid var(--border);
  border-radius:4px;
  padding:4px 7px;
  min-width:58px;max-width:80px;
  position:relative;
  animation:cardIn 0.25s ease-out both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.player-card.fouled-out{opacity:0.2;filter:grayscale(1);}
#players-a .player-card{border-color:rgba(232,48,80,0.2);}
#players-b .player-card{border-color:rgba(48,144,248,0.2);}
body.sport-basketball .players-col.left-col  .player-card{border-color:rgba(232,48,80,0.22);}
body.sport-basketball .players-col.right-col .player-card{border-color:rgba(255,152,0,0.22);}

.p-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:0.9rem;letter-spacing:0.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:72px;
}
.p-fouls{display:flex;gap:2px;margin-top:2px;}
.foul-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--dim);}
.foul-dot.active{background:var(--orange);border-color:var(--orange);box-shadow:0 0 4px var(--orange);}
.foul-dot.fifth{background:var(--red);border-color:var(--red);box-shadow:0 0 6px var(--red);}
.fo-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);font-family:'Bebas Neue',sans-serif;font-size:0.85rem;color:var(--red);}

/* ── PLAYER NAME ONLY (handball/volleyball/football) ── */
.p-name-only{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.88rem;font-weight:600;
  letter-spacing:0.06em;
  padding:2px 8px;
  color:rgba(255,255,255,0.55);
  white-space:nowrap;
}

/* ══════════════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════════════ */
#footer-stripe{height:1px;flex-shrink:0;position:relative;z-index:10;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.15;}
#footer-logo{position:fixed;bottom:10px;right:12px;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:0.22em;z-index:10;padding:2px 7px;border:1px solid rgba(255,255,255,0.03);border-radius:3px;background:rgba(255,255,255,0.01);color:rgba(255,255,255,0.05);}
#footer-logo span{color:var(--accent);opacity:0.18;}

/* ══════════════════════════════════════════════════════
   INTERMISSION OVERLAY
══════════════════════════════════════════════════════ */
#int-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;gap:12px;backdrop-filter:blur(18px);
}
#int-overlay.show{display:flex;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#int-overlay::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(240,112,48,0.12);animation:ringP 3s ease-in-out infinite;}
#int-overlay::after{content:'';position:absolute;width:430px;height:430px;border-radius:50%;border:1px solid rgba(240,112,48,0.06);animation:ringP 3.8s ease-in-out infinite 0.7s;}
@keyframes ringP{0%,100%{transform:scale(0.92);opacity:0.4}50%{transform:scale(1.05);opacity:1}}
#int-label{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,7vw,5.5rem);letter-spacing:0.28em;color:var(--orange);text-shadow:0 0 80px rgba(240,112,48,0.6);animation:floatT 3.5s ease-in-out infinite;position:relative;z-index:1;}
@keyframes floatT{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#int-timer{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,9vw,8rem);color:var(--text);letter-spacing:0.06em;position:relative;z-index:1;}
#int-next{font-size:0.8rem;letter-spacing:0.38em;color:var(--dim);position:relative;z-index:1;}

/* ══════════════════════════════════════════════════════
   COUNTDOWN OVERLAY
══════════════════════════════════════════════════════ */
#countdown-overlay{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
  z-index:120;pointer-events:none;
  background:rgba(0,0,0,0.75);
}
#countdown-overlay.show{display:flex;}
#countdown-digit{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(10rem,25vw,20rem);
  color:var(--accent);letter-spacing:0.04em;
  text-shadow:0 0 80px var(--accent),0 0 160px rgba(255,255,255,0.08);
  animation:cdPop 0.4s cubic-bezier(0.16,1,0.3,1);
  text-align:center;
}
@keyframes cdPop{from{transform:scale(1.7);opacity:0}to{transform:scale(1);opacity:1}}

/* ══════════════════════════════════════════════════════
   SCORE FLASH
══════════════════════════════════════════════════════ */

<script>
/* ════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════ */
const $=id=>document.getElementById(id);
const BODY=document.body;

/* ════════════════════════════════════════════════════
   AUDIO — resolves assets/ next to this file
════════════════════════════════════════════════════ */
function assetPath(name){
  try{
    return new URL(`../../assets/${name}`, location.href).href;
  }catch(e){return 'assets/'+name;}
}
const SFX={countdown:assetPath('countdown.mp3'),matchstart:assetPath('matchstart.mp3'),foulOrRed:assetPath('foulOrRedCard.mp3'),matchend:assetPath('matchend.mp3')};
const SFX_PLAYERS={};
Object.keys(SFX).forEach(k=>{
  const a=new Audio(SFX[k]);
  a.preload='auto';
  SFX_PLAYERS[k]=a;
});
function playSound(key){
  try{
    const a=SFX_PLAYERS[key];
    if(!a)return;
    a.currentTime=0;
    a.volume=0.85;
    a.play().catch(()=>{});
  }catch(e){}
}

/* ════════════════════════════════════════════════════
   COUNTDOWN
════════════════════════════════════════════════════ */
const cdOverlay=$('countdown-overlay'), cdDigit=$('countdown-digit');
function showCountdown(from,cb){
  let n=Math.max(1,Math.floor(from)||3);
  playSound('countdown');
  function tick(){
    cdDigit.textContent=n;
    cdDigit.style.animation='none';void cdDigit.offsetWidth;cdDigit.style.animation='';
    cdOverlay.classList.add('show');
    if(n>1){n--;setTimeout(tick,1000);}
    else{
      setTimeout(()=>{
        cdDigit.textContent='TIME TO GAME!';
        cdDigit.style.fontSize='clamp(4rem,9vw,7rem)';
        cdDigit.style.letterSpacing='0.08em';
        cdDigit.style.animation='none';void cdDigit.offsetWidth;cdDigit.style.animation='';
      },1000);
      setTimeout(()=>{
        cdOverlay.classList.remove('show');
        cdDigit.style.fontSize='';
        cdDigit.style.letterSpacing='';
        if(cb)cb();
      },1900);
    }
  }
  tick();
}

/* ════════════════════════════════════════════════════
   STATE TRANSITIONS → SOUND
════════════════════════════════════════════════════ */
function handleTransitions(prev,curr){
  if(!prev||!curr)return;
  // match start
  if(!prev.matchRunning&&curr.matchRunning&&!curr.intermissionRunning)
    showCountdown(3,()=>playSound('matchstart'));
  // intermission start
  if(!prev.intermissionRunning&&curr.intermissionRunning)
    showCountdown(3,()=>{});
  // intermission end → resume
  if(prev.intermissionRunning&&!curr.intermissionRunning&&curr.matchRunning)
    showCountdown(3,()=>playSound('matchstart'));
  // match end
  if(!prev.matchEnded&&curr.matchEnded)
    playSound('matchend');
  // fouls (basketball)
  ['teamA','teamB'].forEach(k=>{
    const pp=(prev[k]&&prev[k].players)||[];
    const cp=(curr[k]&&curr[k].players)||[];
    for(let i=0;i<Math.max(pp.length,cp.length);i++){
      if((cp[i]&&cp[i].fouls||0)>(pp[i]&&pp[i].fouls||0)){playSound('foulOrRed');break;}
    }
    // football red cards (direct)
    const pr=(prev[k]&&prev[k].redCards)||0;
    const cr=(curr[k]&&curr[k].redCards)||0;
    if(cr>pr)playSound('foulOrRed');
    // basketball team fouls
    const ptf=(prev[k]&&prev[k].teamFouls)||0;
    const ctf=(curr[k]&&curr[k].teamFouls)||0;
    if(ctf>ptf)playSound('foulOrRed');
  });
}

/* ════════════════════════════════════════════════════
   PARTICLES
════════════════════════════════════════════════════ */
(function(){
  const cv=$('bg'),ctx=cv.getContext('2d');let W,H;
  function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  rsz();addEventListener('resize',rsz);
  const P=[];
  function mk(){
    const s=Math.random()<0.5?'L':'R',c=Math.random()<0.1;
    let x,col;
    if(c){x=W/2+(Math.random()-.5)*180;col=[240,192,64];}
    else if(s==='L'){x=Math.random()*(W/2-80);col=[232,48,80];}
    else{x=W/2+80+Math.random()*(W/2-80);col=[48,144,248];}
    return{x,y:H+6,col,sz:Math.random()*1.3+0.2,vy:-(Math.random()*0.4+0.12),vx:(Math.random()-.5)*0.22,life:1,decay:Math.random()*0.003+0.001};
  }
  for(let i=0;i<65;i++){const p=mk();p.y=Math.random()*H;P.push(p);}
  (function frame(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.3)P.push(mk());
    while(P.length>100)P.shift();
    for(let i=P.length-1;i>=0;i--){
      const p=P[i];p.y+=p.vy;p.x+=p.vx;p.life-=p.decay;
      if(p.life<=0||p.y<-4){P.splice(i,1);continue;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${(p.life*0.13).toFixed(3)})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  })();
})();

/* ════════════════════════════════════════════════════
   TIMER RING UPDATE
════════════════════════════════════════════════════ */
const CIRC=263.9;
function updateRing(fillEl,liqEl,wrapEl,secs,maxSecs,warn){
  const ratio=maxSecs>0?Math.min(1,secs/maxSecs):0;
  let sc,lc;
  if(warn){sc='#e83050';lc='rgba(232,48,80,0.15)';}
  else if(ratio>0.5){sc='#38e888';lc='rgba(56,232,136,0.08)';}
  else if(ratio>0.2){sc='#f0c040';lc='rgba(240,192,64,0.08)';}
  else{sc='#e83050';lc='rgba(232,48,80,0.15)';}
  fillEl.style.stroke=sc;
  fillEl.setAttribute('stroke-dashoffset',String(CIRC*(1-ratio)));
  if(liqEl){liqEl.style.height=(ratio*100)+'%';liqEl.style.background=lc;}
  if(wrapEl)wrapEl.classList.toggle('warning',warn);
}

/* ════════════════════════════════════════════════════
   SHOTCLOCK (15 s) — basketball only
════════════════════════════════════════════════════ */
const SC_MAX=15;
let scSecs=SC_MAX,scRunning=false,scInterval=null;
function startShotclock(){
  scSecs=SC_MAX;scRunning=true;
  clearInterval(scInterval);
  scInterval=setInterval(()=>{
    scSecs=Math.max(0,scSecs-1);
    renderShotclock();
    if(scSecs<=0){clearInterval(scInterval);scRunning=false;}
  },1000);
  renderShotclock();
}
function resetShotclock(){
  clearInterval(scInterval);scSecs=SC_MAX;scRunning=false;renderShotclock();
}
function renderShotclock(){
  const el=$('shotclock-digits'),fill=$('sc-fill');
  if(!el)return;
  el.textContent=String(scSecs).padStart(2,'0');
  const warn=scSecs<=5;
  el.className=warn?'warn':'';
  if(fill){
    fill.style.stroke=warn?'#e83050':getComputedStyle(BODY).getPropertyValue('--accent').trim()||'#ff7700';
    fill.setAttribute('stroke-dashoffset',String(CIRC*(1-scSecs/SC_MAX)));
  }
}

/* ════════════════════════════════════════════════════
   SCORE FLASH
════════════════════════════════════════════════════ */
let prevA=-1,prevB=-1;
function triggerFlash(team,side){
  const f=$('score-flash'),ft=$('flash-text'),fs=$('flash-sub');
  ft.textContent=team.name||(side==='a'?'TEAM A':'TEAM B');
  ft.style.color=side==='a'?'var(--teamA)':'var(--teamB)';
  fs.textContent='HIGHSCORE';
  f.classList.remove('fire');void f.offsetWidth;f.classList.add('fire');
  BODY.classList.add('flash-glow');
  setTimeout(()=>BODY.classList.remove('flash-glow'),900);
  let sh=document.getElementById('score-sheen');
  if(!sh){sh=document.createElement('div');sh.id='score-sheen';sh.className='score-sheen';BODY.appendChild(sh);}
  sh.classList.remove('show');void sh.offsetWidth;sh.classList.add('show');
  sh.addEventListener('animationend',()=>sh.classList.remove('show'),{once:true});
}

/* ════════════════════════════════════════════════════
   CACHED DOM
════════════════════════════════════════════════════ */
const elNameA=$('name-a'),elNameB=$('name-b');
const elScoreA=$('score-a'),elScoreB=$('score-b');
const elTimerDigits=$('timer-digits'),elStatusPill=$('status-pill');
const elRoundLbl=$('round-lbl'),elRoundNum=$('round-num'),elRoundOf=$('round-of');
const elIntOverlay=$('int-overlay'),elIntTimer=$('int-timer'),elIntNext=$('int-next');
const elBottomBar=$('bottom-bar'),elPlayersA=$('players-a'),elPlayersB=$('players-b');
const elSubA=$('sub-a'),elSubB=$('sub-b');
const elSportBadge=$('sport-badge'),elTexRect=$('tex-rect'),elWaitOverlay=$('wait-overlay');
const elCenterPanel=$('center-panel'),elBBspacer=$('bb-spacer');
let activeSport=null,timerMax=900;
let state=null,prevStateObj=null,_prevSer='';

/* ════════════════════════════════════════════════════
   APPLY SPORT
════════════════════════════════════════════════════ */
function applySport(sport){
  activeSport=sport;
  BODY.className='sport-'+sport;
  if(elWaitOverlay)elWaitOverlay.style.display='none';

  // texture
  const pats={basketball:'bball-pat',football:'foot-pat',handball:'hand-pat',volleyball:'voll-pat'};
  if(elTexRect)elTexRect.setAttribute('fill',`url(#${pats[sport]||'hand-pat'})`);

  // badge
  const names={basketball:'BASKETBALL — HIGHSCORE',football:'FOOTBALL — HIGHSCORE',handball:'HANDBALL — HIGHSCORE',volleyball:'VOLLEYBALL — HIGHSCORE'};
  if(elSportBadge)elSportBadge.textContent=names[sport]||'HIGHSCORE';

  // round label
  if(elRoundLbl&&elRoundNum&&elRoundOf){
    if(sport==='basketball'){
      elRoundLbl.textContent='QUARTER';elRoundLbl.style.display='';
      elRoundNum.style.display='';elRoundOf.textContent='OF 4';elRoundOf.style.display='';
    }else if(sport==='football'){
      elRoundLbl.textContent='HALF';elRoundLbl.style.display='';
      elRoundNum.style.display='';elRoundOf.textContent='OF 2';elRoundOf.style.display='';
    }else{
      elRoundLbl.style.display='none';elRoundNum.style.display='none';elRoundOf.style.display='none';
    }
  }

  // bottom bar layout
  if(elBottomBar){
    if(sport==='basketball'){
      elBottomBar.className='show bball-layout';
    }else if(sport==='handball'||sport==='volleyball'){
      elBottomBar.className='show free-layout';
    }else{
      elBottomBar.className='';elBottomBar.style.display='none';
    }
  }

  // center panel width — basketball gets wider
  if(elCenterPanel){
    if(sport==='basketball'){
      const w=Math.min(320,Math.max(250,Math.floor(innerWidth*0.22)));
      elCenterPanel.style.width=w+'px';
      if(elBBspacer)elBBspacer.style.width=w+'px';
    }else{
      elCenterPanel.style.width='';
      if(elBBspacer)elBBspacer.style.width='';
    }
  }
}

/* ════════════════════════════════════════════════════
   RENDER BILLBOARD
════════════════════════════════════════════════════ */
function renderBillboard(s){
  if(!s||!activeSport)return;

  // names
  if(elNameA)elNameA.textContent=s.teamA.name||'TEAM A';
  if(elNameB)elNameB.textContent=s.teamB.name||'TEAM B';

  // scores + bump
  if(elScoreA&&prevA!==-1&&s.teamA.score>prevA){elScoreA.classList.remove('bump');void elScoreA.offsetWidth;elScoreA.classList.add('bump');triggerFlash(s.teamA,'a');}
  if(elScoreB&&prevB!==-1&&s.teamB.score>prevB){elScoreB.classList.remove('bump');void elScoreB.offsetWidth;elScoreB.classList.add('bump');triggerFlash(s.teamB,'b');}
  if(elScoreA)elScoreA.textContent=s.teamA.score??0;
  if(elScoreB)elScoreB.textContent=s.teamB.score??0;
  prevA=s.teamA.score??0;prevB=s.teamB.score??0;

  // main timer
  const secs=s.timerSeconds??0;
  const m=Math.floor(secs/60),sc=secs%60;
  if(elTimerDigits)elTimerDigits.textContent=`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  const warn=secs<=60&&s.matchRunning;
  const max=s.roundMinutes?s.roundMinutes*60:timerMax;
  if(max>0)timerMax=max;
  updateRing($('t-fill'),$('timer-liquid'),$('timer-wrap'),secs,timerMax,warn);

  // status
  if(elStatusPill){
    if(s.intermissionRunning){elStatusPill.textContent='INTERMISSION';elStatusPill.className='intermission';}
    else if(s.matchRunning){elStatusPill.textContent='LIVE';elStatusPill.className='live';}
    else if(s.matchEnded){elStatusPill.textContent='FINAL';elStatusPill.className='ended';}
    else{elStatusPill.textContent='WAITING';elStatusPill.className='';}
  }

  // round
  if(elRoundNum)elRoundNum.textContent=s.round||1;

  // intermission overlay
  if(elIntOverlay){
    if(s.intermissionRunning){
      elIntOverlay.classList.add('show');
      const it=s.intermissionSeconds??0;
      if(elIntTimer)elIntTimer.textContent=`${String(Math.floor(it/60)).padStart(2,'0')}:${String(it%60).padStart(2,'0')}`;
      if(elIntNext)elIntNext.textContent=activeSport==='football'?'SECOND HALF STARTING SOON':`PERIOD ${(s.round||1)+1} STARTING SOON`;
    }else{
      elIntOverlay.classList.remove('show');
    }
  }

  // sport-specific rendering
  if(activeSport==='basketball') renderBball(s);
  else if(activeSport==='football') renderFootball(s);
  else if(activeSport==='handball'||activeSport==='volleyball') renderFreePlay(s);
}

/* ── BASKETBALL ──
   Under score: team fouls (sum of player fouls + explicit teamFouls field)
   Bottom bar: all players with foul dots (up to 20)
*/
function renderBball(s){
  ['a','b'].forEach(side=>{
    const team=side==='a'?s.teamA:s.teamB;
    const sub=side==='a'?elSubA:elSubB;
    const cont=side==='a'?elPlayersA:elPlayersB;
    const players=team.players||[];

    // Team fouls: explicit field OR sum of player fouls
    const tf=(typeof team.teamFouls==='number')
      ? team.teamFouls
      : players.reduce((a,p)=>a+(p.fouls||0),0);

    if(sub){
      sub.innerHTML=`<div class="tf-label">TEAM FOULS</div><div class="tf-count">${tf}</div>`;
    }

    if(cont){
      cont.innerHTML='';
      const frag=document.createDocumentFragment();
      players.slice(0,20).forEach((p,i)=>{
        const fouls=p.fouls||0,out=fouls>=5;
        const card=document.createElement('div');
        card.className='player-card'+(out?' fouled-out':'');
        card.style.animationDelay=(i*0.03)+'s';
        const nm=document.createElement('div');nm.className='p-name';nm.textContent=p.name||`P${i+1}`;
        const fd=document.createElement('div');fd.className='p-fouls';
        for(let d=1;d<=5;d++){
          const dot=document.createElement('div');
          dot.className='foul-dot'+(d<=fouls?(d===5?' fifth':' active'):'');
          fd.appendChild(dot);
        }
        card.appendChild(nm);card.appendChild(fd);
        if(out){const ol=document.createElement('div');ol.className='fo-label';ol.textContent='OUT';card.appendChild(ol);}
        frag.appendChild(card);
      });
      cont.appendChild(frag);
    }
  });
}

/* ── FOOTBALL ──
   Under score: red cards directly (big card icons)
   No yellow cards shown on billboard
   No players section
*/
function renderFootball(s){
  ['a','b'].forEach(side=>{
    const team=side==='a'?s.teamA:s.teamB;
    const sub=side==='a'?elSubA:elSubB;
    if(!sub)return;
    const reds=Math.max(0,team.redCards||0);
    let html='<div class="cards-row">';
    if(reds>0){
      for(let r=0;r<reds;r++)html+='<div class="card-icon red"></div>';
    }else{
      html+='<span class="no-cards-lbl">NO CARDS</span>';
    }
    html+='</div>';
    sub.innerHTML=html;
  });
  // clear players
  if(elPlayersA)elPlayersA.innerHTML='';
  if(elPlayersB)elPlayersB.innerHTML='';
}

/* ── HANDBALL / VOLLEYBALL ──
   Under score: nothing (or status)
   Bottom bar: player name list for each team
*/
function renderFreePlay(s){
  // clear subs
  if(elSubA)elSubA.innerHTML='';
  if(elSubB)elSubB.innerHTML='';

  ['a','b'].forEach(side=>{
    const team=side==='a'?s.teamA:s.teamB;
    const cont=side==='a'?elPlayersA:elPlayersB;
    if(!cont)return;
    cont.innerHTML='';
    const players=team.players||[];
    const frag=document.createDocumentFragment();
    players.forEach((p,i)=>{
      const el=document.createElement('div');
      el.className='p-name-only';
      el.style.animationDelay=(i*0.03)+'s';
      el.textContent=p.name||`P${i+1}`;
      frag.appendChild(el);
    });
    cont.appendChild(frag);
  });
}

/* ════════════════════════════════════════════════════
   POLL / STORAGE SYNC
════════════════════════════════════════════════════ */
function loadState(){try{const r=localStorage.getItem('hs_state');return r?JSON.parse(r):null;}catch(e){return null;}}

function applyState(ns){
  const nsSer=ns?JSON.stringify(ns):'';
  if(nsSer===_prevSer)return;
  try{handleTransitions(prevStateObj,ns);}catch(e){}
  _prevSer=nsSer;
  prevStateObj=ns?JSON.parse(JSON.stringify(ns)):null;
  state=ns;
  if(state){
    if(state.sport&&state.sport!==activeSport)applySport(state.sport);
    if(activeSport)renderBillboard(state);
  }
}

window.addEventListener('storage',e=>{
  if(e.key!=='hs_state')return;
  try{applyState(e.newValue?JSON.parse(e.newValue):null);}catch(err){}
});
setInterval(()=>applyState(loadState()),1000);
applyState(loadState());
